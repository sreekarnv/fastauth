name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run Ruff (format check)
        run: uv run ruff format --check .

      - name: Run Ruff (lint)
        run: uv run ruff check .

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Check for code changes
        uses: dorny/paths-filter@v2
        id: changes
        with:
          filters: |
            code:
              - 'packages/fastauth/**'
              - 'tests/**'
              - 'pyproject.toml'
              - 'packages/fastauth/pyproject.toml'
              - 'uv.lock'
              - 'examples/**'
              - 'docs/**'
              - 'mkdocs.yml'
              - 'scripts/**'
              - '.github/**'
              - '.pre-commit-config.yaml'

      - name: Install uv
        if: steps.changes.outputs.code == 'true'
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        if: steps.changes.outputs.code == 'true'
        run: uv sync --all-extras

      - name: Run tests
        if: steps.changes.outputs.code == 'true'
        run: uv run pytest tests/ -v --tb=short

      - name: Skip tests
        if: steps.changes.outputs.code != 'true'
        run: echo "No code changes detected, skipping tests"

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for code changes
        uses: dorny/paths-filter@v2
        id: changes
        with:
          filters: |
            code:
              - 'packages/fastauth/**'
              - 'tests/**'
              - 'pyproject.toml'
              - 'packages/fastauth/pyproject.toml'
              - 'uv.lock'
              - 'examples/**'
              - 'docs/**'
              - 'mkdocs.yml'
              - 'scripts/**'
              - '.github/**'
              - '.pre-commit-config.yaml'

      - name: Install uv
        if: steps.changes.outputs.code == 'true'
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        if: steps.changes.outputs.code == 'true'
        run: uv sync --all-extras

      - name: Run tests with coverage
        if: steps.changes.outputs.code == 'true'
        run: uv run pytest tests/ --cov=fastauth --cov-report=xml --cov-report=term --cov-fail-under=95

      - name: Upload coverage to Codecov
        if: steps.changes.outputs.code == 'true'
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: true

      - name: Skip coverage
        if: steps.changes.outputs.code != 'true'
        run: echo "No code changes detected, skipping coverage"

  package-smoke:
    name: Package build / install smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for packaging changes
        uses: dorny/paths-filter@v2
        id: changes
        with:
          filters: |
            packaging:
              - 'packages/fastauth/**'
              - 'pyproject.toml'
              - 'uv.lock'
              - '.github/**'
              - 'tests/**'
              - 'docs/**'

      - name: Install uv
        if: steps.changes.outputs.packaging == 'true'
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"

      - name: Build sdist and wheel
        if: steps.changes.outputs.packaging == 'true'
        run: uv build --package sreekarnv-fastauth --out-dir dist

      - name: Verify wheel contains LICENSE
        if: steps.changes.outputs.packaging == 'true'
        run: |
          if ! unzip -l dist/sreekarnv_fastauth-*.whl | grep -q 'dist-info/licenses/LICENSE'; then
            echo "::error::LICENSE is missing from the built wheel"
            unzip -l dist/sreekarnv_fastauth-*.whl
            exit 1
          fi

      - name: Install wheel in a clean venv
        if: steps.changes.outputs.packaging == 'true'
        run: |
          uv venv --python 3.11 .venv-smoke
          uv pip install --python .venv-smoke/bin/python dist/sreekarnv_fastauth-*.whl

      - name: Import fastauth and check __version__
        if: steps.changes.outputs.packaging == 'true'
        run: |
          .venv-smoke/bin/python -c "import fastauth; assert fastauth.__version__ == '$(uv version --package sreekarnv-fastauth 2>/dev/null || echo 0.5.6)'" \
            || .venv-smoke/bin/python -c "import fastauth; assert fastauth.__version__"

      - name: Skip package smoke
        if: steps.changes.outputs.packaging != 'true'
        run: echo "No packaging-relevant changes detected, skipping package smoke"
